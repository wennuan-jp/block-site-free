<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBlock Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">ZenBlock</div>
            <div class="tagline">Minimalist focus control</div>
        </header>

        <main>
            <section class="pattern-input">
                <h2>Block New Site</h2>
                <div class="input-group">
                    <input type="text" id="patternInput" placeholder="e.g. baidu.com" spellcheck="false">
                    <button id="addBtn">Add</button>
                </div>
                <p class="hint">Enter a domain or keyword to block (e.g., <code>baidu.com</code>)</p>
            </section>

            <section class="pattern-list">
                <h2>Blocked Patterns</h2>
                <ul id="blockedList">
                    <!-- Patterns will be injected here -->
                </ul>
            </section>

            <section class="pattern-input white-list-input">
                <h2>Manual White List</h2>
                <div class="input-group">
                    <input type="text" id="whiteListInput" placeholder="e.g. mail.baidu.com" spellcheck="false">
                    <button id="addWhiteBtn">Allow</button>
                </div>
                <p class="hint">Enter a specific URL or subdomain to allow even if the domain is blocked.</p>
            </section>

            <section class="pattern-list">
                <h2>White List</h2>
                <ul id="whiteList">
                    <!-- Patterns will be injected here -->
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 ZenBlock. Crafted for deep work.</p>
        </footer>
    </div>
    <script src="options.js"></script>
</body>
</html>
